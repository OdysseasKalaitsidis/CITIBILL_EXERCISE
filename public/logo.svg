<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="100%" height="100%">
  <defs>
    <!-- Webapp Brand Gradient Definitions -->
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF385C" /> <!-- Webapp Accent Color -->
      <stop offset="60%" stop-color="#FF5D7B" /> <!-- Lighter Rose-Pink -->
      <stop offset="100%" stop-color="#FF9238" /> <!-- Warm Orange / Sunset Glow -->
    </linearGradient>
    <linearGradient id="circle-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#FF385C" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#FF9238" stop-opacity="0.10" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background Aura Circle -->
  <circle cx="24" cy="24" r="22" fill="url(#circle-grad)" stroke="url(#brand-grad)" stroke-width="1.5" stroke-dasharray="4 2" />

  <!-- Background Grid Dots -->
  <circle cx="16" cy="16" r="1" fill="#FF385C" opacity="0.3" />
  <circle cx="32" cy="16" r="1" fill="#FF9238" opacity="0.3" />
  <circle cx="16" cy="32" r="1" fill="#FF9238" opacity="0.3" />
  <circle cx="32" cy="32" r="1" fill="#FF385C" opacity="0.3" />

  <!-- Stylized Soaring Paper Airplane (representing travel & planning direction) -->
  <!-- Left Wing (Deep Rose Tone) -->
  <path d="M12,32 L36,12 L24,24 Z" fill="#B81D4F" opacity="0.9" />
  
  <!-- Right Wing (Brand Gradient Accent with Glow) -->
  <path d="M36,12 L24,24 L30,30 Z" fill="url(#brand-grad)" filter="url(#glow)" />
  
  <!-- Fold / Tail Underneath (Deep Contrast Shadow) -->
  <path d="M24,24 L26,29 L30,30 Z" fill="#800D2D" />
  
  <!-- Trail / Flight Paths -->
  <path d="M10,34 Q18,36 22,30" fill="none" stroke="#FF5D7B" stroke-width="1.5" stroke-linecap="round" opacity="0.6" />
  <path d="M8,38 Q16,40 18,36" fill="none" stroke="#FF9238" stroke-width="1.5" stroke-linecap="round" opacity="0.4" />
</svg>
